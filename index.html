<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>🏆 لوحة المتصدرين - كأس العالم 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ============================================================
           ROOT & RESET
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-primary: #0a0e17;
            --bg-secondary: #111927;
            --bg-card: rgba(17, 25, 40, 0.85);
            --bg-card-hover: rgba(30, 45, 70, 0.92);
            --bg-input: rgba(255, 255, 255, 0.04);
            --gold: #d4a745;
            --gold-light: #f0d080;
            --gold-glow: rgba(212, 167, 69, 0.15);
            --gold-gradient: linear-gradient(135deg, #e8c86a, #c99a2e);
            --text-primary: #edf2f7;
            --text-secondary: #8a9bb5;
            --text-muted: #5a6f8c;
            --success: #2ecc71;
            --success-bg: rgba(46, 204, 113, 0.10);
            --danger: #e74c3c;
            --danger-bg: rgba(231, 76, 60, 0.10);
            --info: #4a9eff;
            --info-bg: rgba(74, 158, 255, 0.10);
            --border-subtle: rgba(255, 255, 255, 0.04);
            --border-gold: rgba(212, 167, 69, 0.20);
            --shadow-card: 0 12px 48px rgba(0, 0, 0, 0.50), 0 0 0 1px rgba(255, 255, 255, 0.02);
            --shadow-glow: 0 0 60px rgba(212, 167, 69, 0.04);
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            --transition: all 0.30s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            --bg-primary: #f4f6f9;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.92);
            --bg-card-hover: rgba(255, 255, 255, 0.98);
            --bg-input: rgba(0, 0, 0, 0.02);
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-subtle: rgba(0, 0, 0, 0.06);
            --border-gold: rgba(212, 167, 69, 0.30);
            --shadow-card: 0 12px 48px rgba(0, 0, 0, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.02);
            --shadow-glow: 0 0 60px rgba(212, 167, 69, 0.06);
            --gold-glow: rgba(212, 167, 69, 0.12);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Cairo', 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            font-size: 14px;
            line-height: 1.7;
            transition: var(--transition);
            padding: 16px;
        }

        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 10px;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ============================================================
           الهيدر
           ============================================================ */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-gold);
            margin-bottom: 24px;
            backdrop-filter: blur(12px);
        }
        .header .title {
            font-size: 1.4rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header .title .trophy {
            font-size: 1.8rem;
        }
        .header .title span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }
        .header .actions button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .header .actions button:hover {
            background: var(--gold-glow);
            border-color: var(--gold);
            color: var(--gold-light);
            transform: translateY(-2px);
        }
        .header .actions button.active {
            background: var(--gold-glow);
            border-color: var(--gold);
            color: var(--gold-light);
        }

        /* ============================================================
           لوحة المتصدرين
           ============================================================ */
        .leaderboard-section {
            background: var(--bg-card);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius-lg);
            padding: 28px 28px 20px;
            margin-bottom: 28px;
            box-shadow: var(--shadow-card), var(--shadow-glow);
            transition: var(--transition);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }
        .leaderboard-section::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, var(--gold-glow) 0%, transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }
        .leaderboard-section .lb-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }
        .leaderboard-section .lb-header .title {
            font-size: 1.3rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .leaderboard-section .lb-header .title .trophy {
            font-size: 1.8rem;
        }
        .leaderboard-section .lb-header .title span {
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .leaderboard-section .lb-header .lb-stats {
            display: flex;
            gap: 18px;
            font-size: 0.75rem;
            color: var(--text-secondary);
            align-items: center;
            flex-wrap: wrap;
        }
        .leaderboard-section .lb-header .lb-stats .stat {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .leaderboard-section .lb-header .lb-stats .stat .num {
            color: var(--gold-light);
            font-weight: 800;
        }

        .lb-period-tabs {
            display: flex;
            gap: 6px;
            background: rgba(255, 255, 255, 0.02);
            padding: 4px;
            border-radius: 40px;
            border: 1px solid var(--border-subtle);
            margin-bottom: 18px;
            flex-wrap: wrap;
            align-items: center;
            position: relative;
            z-index: 1;
        }
        .lb-period-tabs .period-btn {
            padding: 6px 18px;
            border-radius: 30px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-family: inherit;
        }
        .lb-period-tabs .period-btn:hover {
            color: var(--text-primary);
            background: rgba(255, 255, 255, 0.04);
        }
        .lb-period-tabs .period-btn.active {
            background: var(--gold-glow);
            color: var(--gold-light);
        }

        /* بطاقة البطل */
        .champion-card {
            background: linear-gradient(145deg, rgba(212, 167, 69, 0.08), rgba(212, 167, 69, 0.01));
            border: 1px solid var(--gold);
            border-radius: var(--radius-lg);
            padding: 24px 28px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 28px;
            flex-wrap: wrap;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
            box-shadow: 0 0 60px rgba(212, 167, 69, 0.04);
            cursor: pointer;
        }
        .champion-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 80px rgba(212, 167, 69, 0.08);
        }
        .champion-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, rgba(212, 167, 69, 0.08), transparent 70%);
            pointer-events: none;
            border-radius: 50%;
        }
        .champion-card .rank-badge {
            font-size: 2.8rem;
            min-width: 64px;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .champion-card .avatar {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: var(--gold-gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 900;
            color: #0a0e1a;
            box-shadow: 0 0 40px rgba(212, 167, 69, 0.25);
            flex-shrink: 0;
            position: relative;
            z-index: 1;
        }
        .champion-card .info {
            flex: 1;
            min-width: 180px;
            position: relative;
            z-index: 1;
        }
        .champion-card .info .name {
            font-size: 1.25rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            cursor: pointer;
        }
        .champion-card .info .name .badge {
            font-size: 0.5rem;
            padding: 2px 14px;
            border-radius: 40px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .champion-card .info .name .badge.gold {
            background: var(--gold-glow);
            color: var(--gold-light);
            border: 1px solid var(--border-gold);
        }
        .champion-card .info .name .badge.precision {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid rgba(46, 204, 113, 0.15);
        }
        .champion-card .info .stats-row {
            display: flex;
            gap: 22px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .champion-card .info .stats-row .item {
            font-size: 0.75rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .champion-card .info .stats-row .item strong {
            color: var(--text-primary);
            font-weight: 700;
        }
        .champion-card .info .stats-row .item .highlight {
            color: var(--gold-light);
        }
        .champion-card .progress-wrapper {
            width: 100%;
            margin-top: 12px;
        }
        .champion-card .progress-wrapper .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .champion-card .progress-bar {
            width: 100%;
            height: 5px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            overflow: hidden;
        }
        .champion-card .progress-bar .fill {
            height: 100%;
            background: var(--gold-gradient);
            border-radius: 10px;
            transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            width: 0%;
        }

        /* قائمة اللاعبين */
        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            transition: all 0.3s ease;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-md);
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            backdrop-filter: blur(4px);
        }
        .player-card:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--border-gold);
            transform: translateX(-4px);
        }
        .player-card .rank {
            font-size: 1rem;
            font-weight: 800;
            min-width: 34px;
            color: var(--text-secondary);
        }
        .player-card .rank.gold {
            color: #FFD700;
        }
        .player-card .rank.silver {
            color: #C0C0C0;
        }
        .player-card .rank.bronze {
            color: #CD7F32;
        }
        .player-card .rank.tie {
            color: var(--gold-light);
            font-size: 0.8rem;
        }
        .player-card .avatar-sm {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(212, 167, 69, 0.15), rgba(212, 167, 69, 0.03));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
            color: var(--text-primary);
            flex-shrink: 0;
            border: 2px solid transparent;
            transition: var(--transition);
        }
        .player-card .avatar-sm.gold-border {
            border-color: #FFD700;
        }
        .player-card .avatar-sm.silver-border {
            border-color: #C0C0C0;
        }
        .player-card .avatar-sm.bronze-border {
            border-color: #CD7F32;
        }
        .player-card .info-sm {
            flex: 1;
            min-width: 0;
        }
        .player-card .info-sm .name-sm {
            font-weight: 700;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }
        .player-card .info-sm .name-sm .mini-badge {
            font-size: 0.4rem;
            padding: 1px 10px;
            border-radius: 40px;
            font-weight: 700;
        }
        .player-card .info-sm .name-sm .mini-badge.gold {
            background: var(--gold-glow);
            color: var(--gold-light);
        }
        .player-card .info-sm .name-sm .mini-badge.green {
            background: var(--success-bg);
            color: var(--success);
        }
        .player-card .info-sm .sub-sm {
            font-size: 0.6rem;
            color: var(--text-secondary);
            display: flex;
            gap: 14px;
            flex-wrap: wrap;
        }
        .player-card .info-sm .sub-sm .highlight {
            color: var(--gold-light);
            font-weight: 600;
        }
        .player-card .points-sm {
            background: var(--gold-gradient);
            padding: 2px 16px;
            border-radius: 40px;
            font-weight: 800;
            font-size: 0.8rem;
            color: #0a0e1a;
            min-width: 40px;
            text-align: center;
        }
        .player-card .progress-mini {
            width: 60px;
            height: 4px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 4px;
        }
        .player-card .progress-mini .fill-mini {
            height: 100%;
            background: var(--gold-gradient);
            border-radius: 10px;
            transition: width 0.6s ease;
            width: 0%;
        }
        .player-card .current-user-indicator {
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            border: 2px solid var(--gold);
            border-radius: var(--radius-md);
            pointer-events: none;
            opacity: 0;
            transition: var(--transition);
            box-shadow: 0 0 40px rgba(212, 167, 69, 0.08);
        }
        .player-card .current-user-indicator.active {
            opacity: 1;
        }
        .player-card .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulseDot 1.5s infinite;
        }
        @keyframes pulseDot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .empty-state {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.01);
            border-radius: var(--radius-lg);
            border: 1px dashed var(--border-subtle);
            grid-column: 1/-1;
        }
        .empty-state .icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 12px;
        }

        /* ============================================================
           النوافذ المنبثقة (مودال)
           ============================================================ */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(20px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            animation: fadeInModal 0.3s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        @keyframes fadeInModal {
            from { opacity: 0; transform: scale(0.96); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-content {
            background: var(--bg-secondary);
            border: 1px solid var(--border-gold);
            border-radius: var(--radius-lg);
            padding: 28px 32px;
            max-width: 700px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.60);
            position: relative;
            transition: all 0.3s ease;
        }
        .modal-close {
            position: absolute;
            top: 12px;
            left: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: none;
            color: var(--text-secondary);
            font-size: 1.4rem;
            cursor: pointer;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
            z-index: 10;
        }
        .modal-close:hover {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .modal-title {
            text-align: center;
            font-size: 1.15rem;
            font-weight: 800;
            color: var(--gold-light);
            margin-bottom: 8px;
            padding-top: 6px;
        }
        .modal-subtitle {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 16px;
        }

        .player-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 16px 0;
            background: rgba(255, 255, 255, 0.02);
            border-radius: var(--radius-sm);
            padding: 16px;
            border: 1px solid var(--border-subtle);
        }
        .player-stats-grid .stat-box {
            text-align: center;
        }
        .player-stats-grid .stat-box .stat-value {
            font-size: 1.4rem;
            font-weight: 800;
        }
        .player-stats-grid .stat-box .stat-value.gold {
            color: var(--gold-light);
        }
        .player-stats-grid .stat-box .stat-value.green {
            color: var(--success);
        }
        .player-stats-grid .stat-box .stat-value.red {
            color: var(--danger);
        }
        .player-stats-grid .stat-box .stat-label {
            font-size: 0.6rem;
            color: var(--text-secondary);
        }

        .predictions-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 4px 0;
        }

        .player-prediction-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-subtle);
            border-radius: var(--radius-sm);
            padding: 10px 16px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: var(--transition);
        }
        .player-prediction-item:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: var(--border-gold);
        }
        .player-prediction-item .num {
            font-weight: 800;
            color: var(--text-secondary);
            min-width: 32px;
            font-size: 0.75rem;
        }
        .player-prediction-item .match-info {
            flex: 1;
        }
        .player-prediction-item .match-info .teams {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .player-prediction-item .match-info .teams .flag {
            font-size: 1.1rem;
        }
        .player-prediction-item .match-info .pred {
            font-size: 0.7rem;
            color: var(--gold-light);
            font-weight: 600;
        }
        .player-prediction-item .match-info .status {
            font-size: 0.6rem;
            padding: 2px 12px;
            border-radius: 40px;
            font-weight: 700;
            display: inline-block;
            margin-top: 2px;
        }
        .player-prediction-item .match-info .status.correct {
            background: var(--success-bg);
            color: var(--success);
        }
        .player-prediction-item .match-info .status.wrong {
            background: var(--danger-bg);
            color: var(--danger);
        }
        .player-prediction-item .match-info .status.pending {
            background: var(--gold-glow);
            color: var(--gold-light);
        }
        .player-prediction-item .time {
            font-size: 0.55rem;
            color: var(--text-secondary);
            font-family: monospace;
            white-space: nowrap;
        }

        /* ============================================================
           Toast
           ============================================================ */
        .copy-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(46, 204, 113, 0.95);
            color: #fff;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 0.85rem;
            z-index: 99999;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.30);
            animation: fadeInModal 0.3s ease;
            backdrop-filter: blur(12px);
            display: none;
        }
        .copy-toast.show {
            display: block;
        }

        /* ============================================================
           استجابة
           ============================================================ */
        @media (max-width: 640px) {
            body { padding: 8px; }
            .header { padding: 12px 16px; flex-direction: column; align-items: stretch; text-align: center; }
            .header .actions { justify-content: center; }
            .leaderboard-section { padding: 16px; }
            .champion-card { flex-direction: column; text-align: center; gap: 12px; padding: 16px 18px; }
            .champion-card .rank-badge { font-size: 2.2rem; min-width: auto; }

                            awayAr: rawMatch.awayAr,
                            homePenalty: rawMatch.homePenalty || null,
                            awayPenalty: rawMatch.awayPenalty || null,
                            hadPenalties: rawMatch.hadPenalties || false
                        };
                    }
                }
            }
            
            // Special case for Congo - try to find any match containing "الكونغو"
            if (team1Ar.includes("الكونغو") || team2Ar.includes("الكونغو") ||
                team1Ar.includes("جمهورية الكونغو") || team2Ar.includes("جمهورية الكونغو")) {
                const congoMatch = state.previousGamesData.find(m =>
                    m.homeAr.includes("الكونغو") || m.awayAr.includes("الكونغو") ||
                    m.homeAr.includes("جمهورية الكونغو") || m.awayAr.includes("جمهورية الكونغو")
                );
                if (congoMatch) {
                    console.log(`✅ تم العثور على مباراة للكونغو: ${congoMatch.homeAr} ${congoMatch.homeScore}-${congoMatch.awayScore} ${congoMatch.awayAr}`);
                    return {
                        homeScore: congoMatch.homeScore,
                        awayScore: congoMatch.awayScore,
                        homeAr: congoMatch.homeAr,
                        awayAr: congoMatch.awayAr,
                        homePenalty: congoMatch.homePenalty || null,
                        awayPenalty: congoMatch.awayPenalty || null,
                        hadPenalties: congoMatch.hadPenalties || false
                    };
                }
            }
            
            console.log(`❌ لم يتم العثور على مباراة: ${team1Ar} vs ${team2Ar}`);
            return null;
        }

        // ============================================================
        //  DETERMINE WINNER
        // ============================================================
        function determineWinner(result) {
            if (!result) return null;

            if (result.hadPenalties && result.homePenalty !== null && result.awayPenalty !== null) {
                if (parseInt(result.homePenalty) > parseInt(result.awayPenalty)) {
                    return result.homeAr;
                } else if (parseInt(result.awayPenalty) > parseInt(result.homePenalty)) {
                    return result.awayAr;
                }
                return null;
            }

            if (result.homeScore > result.awayScore) {
                return result.homeAr;
            } else if (result.awayScore > result.homeScore) {
                return result.awayAr;
            }
            return null;
        }

        // ============================================================
        //  GET PREDICTION STATUS
        // ============================================================
        function getPredictionStatus(prediction) {
            if (!prediction || !prediction.match_id) {
                return { status: 'pending', text: '⏳ مباراة غير معروفة' };
            }

            const parts = prediction.match_id.split('_');
            if (parts.length < 3) {
                return { status: 'pending', text: '⏳ بيانات غير مكتملة' };
            }

            const result = findMatchResult(parts[1], parts[2]);

            if (!result) {
                return { status: 'pending', text: '⏳ لم تلعب بعد' };
            }

            const correctResult = determineWinner(result);

            let predictionTeam = prediction.prediction;
            if (predictionTeam !== 'DRAW') {
                predictionTeam = translateToArabic(predictionTeam);
            }

            if (!correctResult) {
                if (predictionTeam === 'DRAW') {
                    return { status: 'correct', text: '✅ صحيح (تعادل)' };
                } else {
                    return { status: 'wrong', text: '❌ خاطئ (تعادل)' };
                }
            }

            if (predictionTeam === correctResult) {
                return { status: 'correct', text: `✅ صحيح (${correctResult})` };
            } else {
                return { status: 'wrong', text: `❌ خاطئ (الفائز: ${correctResult})` };
            }
        }

        // ============================================================
        //  RENDER LEADERBOARD
        // ============================================================
        function setLeaderboardPeriod(period) {
            currentLeaderboardPeriod = period;
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.period === period);
            });
            renderLeaderboard(period);
        }

        function renderLeaderboard(period) {
            const container = document.getElementById("leaderboardContainer");

            const predictions = state.predictions || [];
            const games = state.previousGamesData || [];

            console.log(`📊 عرض: ${predictions.length} توقعات, ${games.length} مباريات`);

            if (predictions.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        لا توجد توقعات في قاعدة البيانات
                        <br><small style="color:var(--text-muted);font-size:0.7rem;">
                            ⚠️ تأكد من أن جدول predictions يحتوي على بيانات
                        </small>
                    </div>
                `;
                document.getElementById('lbTotalPlayers').textContent = '0';
                document.getElementById('lbTotalPredictions').textContent = '0';
                return;
            }

            if (games.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        لا توجد مباريات منتهية في API
                        <br><small style="color:var(--text-muted);font-size:0.7rem;">
                            ⚠️ تأكد من أن API يعمل بشكل صحيح
                        </small>
                    </div>
                `;
                document.getElementById('lbTotalPlayers').textContent = '0';
                document.getElementById('lbTotalPredictions').textContent = predictions.length;
                return;
            }

            // Calculate scores
            const scores = {};
            let totalPredictions = 0;
            
            for (let p of predictions) {
                totalPredictions++;
                if (!scores[p.user_name]) {
                    scores[p.user_name] = { name: p.user_name, points: 0, correct: 0, wrong: 0, total: 0 };
                }
                scores[p.user_name].total++;

                const parts = (p.match_id || "").split("_");
                if (parts.length < 3) continue;
                
                const result = findMatchResult(parts[1], parts[2]);
                if (!result) continue;

                const winner = determineWinner(result);
                let isCorrect = false;
                let predictionTeam = p.prediction;
                if (predictionTeam !== 'DRAW') {
                    predictionTeam = translateToArabic(predictionTeam);
                }

                if (winner === null) {
                    isCorrect = predictionTeam === 'DRAW';
                } else {
                    isCorrect = predictionTeam === winner;
                }

                if (isCorrect) {
                    scores[p.user_name].points++;
                    scores[p.user_name].correct++;
                } else {
                    scores[p.user_name].wrong++;
                }
            }

            const board = Object.values(scores).sort((a, b) => b.points - a.points || (b.correct - a.correct));

            if (!board.length) {
                container.innerHTML = `<div class="empty-state"><span class="icon">📭</span> لا توجد توقعات صحيحة</div>`;
                return;
            }

            document.getElementById('lbTotalPlayers').textContent = board.length;
            document.getElementById('lbTotalPredictions').textContent = totalPredictions;

            // Calculate ranks with ties
            let rank = 1;
            let i = 0;
            while (i < board.length) {
                let j = i;
                let points = board[i].points;
                while (j < board.length && board[j].points === points) {
                    j++;
                }
                const groupSize = j - i;
                for (let k = i; k < j; k++) {
                    board[k].rank = rank;
                }
                i = j;
                rank += groupSize;
            }

            const currentUser = localStorage.getItem('lastUserName') || '';
            const topThree = board.slice(0, 3);
            const rest = board.slice(3, 10);

            let html = '';

            // Champion
            if (topThree.length) {
                const champ = topThree[0];
                const accuracy = champ.total > 0 ? Math.round((champ.correct / champ.total) * 100) : 0;
                const isCurrentUser = champ.name === currentUser;
                const medal = champ.rank === 1 ? '🥇' : champ.rank === 2 ? '🥈' : champ.rank === 3 ? '🥉' : `#${champ.rank}`;

                html += `
                <div class="champion-card" style="${isCurrentUser ? 'border-color:var(--gold);box-shadow:0 0 60px rgba(212,167,69,0.08);' : ''}" onclick="openPlayerPredictions('${champ.name}')">
                    <div class="rank-badge">${medal}</div>
                    <div class="avatar">${champ.name.charAt(0).toUpperCase()}</div>
                    <div class="info">
                        <div class="name">${champ.name} ${isCurrentUser ? '👤' : ''}</div>
                        <div class="stats-row">
                            <span class="item">🏆 <strong>${champ.points}</strong> نقطة</span>
                            <span class="item">✅ <strong style="color:var(--gold-light);">${champ.correct}</strong></span>
                            <span class="item">📊 <strong>${champ.total}</strong></span>
                            <span class="item">🎯 <strong>${accuracy}%</strong></span>
                        </div>
                        <div class="progress-wrapper">
                            <div class="progress-label"><span>نسبة النجاح</span><span>${accuracy}%</span></div>
                            <div class="progress-bar"><div class="fill" style="width:${Math.min(accuracy,100)}%;"></div></div>
                        </div>
                    </div>
                </div>
                `;
            }

            // Rest of players
            if (rest.length || topThree.length > 1) {
                const allPlayers = [...topThree.slice(1), ...rest];
                html += `<div class="players-list">`;
                allPlayers.forEach((player) => {
                    const rankNum = player.rank;
                    const accuracy = player.total > 0 ? Math.round((player.correct / player.total) * 100) : 0;
                    const isCurrentUser = player.name === currentUser;

                    let medal = '';
                    if (rankNum === 1) medal = '🥇';
                    else if (rankNum === 2) medal = '🥈';
                    else if (rankNum === 3) medal = '🥉';
                    else medal = `#${rankNum}`;

                    let rankClass = '';
                    if (rankNum === 1) rankClass = 'gold';
                    else if (rankNum === 2) rankClass = 'silver';
                    else if (rankNum === 3) rankClass = 'bronze';

                    let borderClass = '';
                    if (rankNum === 1) borderClass = 'gold-border';
                    else if (rankNum === 2) borderClass = 'silver-border';
                    else if (rankNum === 3) borderClass = 'bronze-border';

                    const isTie = board.filter(p => p.rank === rankNum).length > 1;
                    const tieBadge = isTie ? ' ⚡' : '';

                    html += `
                    <div class="player-card" style="${isCurrentUser ? 'border-color:rgba(212,167,69,0.30);' : ''}" onclick="openPlayerPredictions('${player.name}')">
                        <div class="rank ${rankClass}">${medal}${tieBadge}</div>
                        <div class="avatar-sm ${borderClass}">${player.name.charAt(0).toUpperCase()}</div>
                        <div class="info-sm">
                            <div class="name-sm">${player.name} ${isCurrentUser ? '👤' : ''}
                                ${isTie ? `<span class="mini-badge gold">⚡ متعادل</span>` : ''}
                            </div>
                            <div class="sub-sm">
                                <span>✅ <span style="color:var(--gold-light);">${player.correct}</span></span>
                                <span>📊 ${player.total}</span>
                                <span>🎯 ${accuracy}%</span>
                            </div>
                            <div class="progress-mini"><div class="fill-mini" style="width:${Math.min(accuracy,100)}%;"></div></div>
                        </div>
                        <div class="points-sm">${player.points}</div>
                        ${isCurrentUser ? `<div class="current-user-indicator active"></div><div class="pulse-dot"></div>` : ''}
                    </div>
                    `;
                });
                html += `</div>`;
            }

            container.innerHTML = html;
        }

        // ============================================================
        //  OPEN PLAYER PREDICTIONS
        // ============================================================
        async function openPlayerPredictions(userName) {
            if (!userName) { showToast('⚠️ اسم المستخدم غير معروف'); return; }

            const modal = document.getElementById('playerPredictionsModal');
            const listContainer = document.getElementById('playerPredictionsList');

            document.getElementById('playerModalTitle').textContent = `📋 توقعات ${userName}`;
            document.getElementById('playerModalSubtitle').textContent = `👤 عرض جميع توقعات اللاعب ${userName}`;

            listContainer.innerHTML = `<div class="empty-state"><span class="icon">⏳</span> جاري التحميل...</div>`;

            let predictions = [];
            if (supabaseClient) {
                try {
                    const { data, error } = await supabaseClient
                        .from("predictions")
                        .select("*")
                        .eq("user_name", userName)
                        .order("created_at", { ascending: false });
                    if (!error && data) {
                        predictions = data;
                    }
                } catch (e) {
                    console.warn("⚠️ فشل جلب توقعات اللاعب:", e);
                }
            }

            if (!predictions.length) {
                listContainer.innerHTML = `<div class="empty-state"><span class="icon">📭</span> لا توجد توقعات لهذا اللاعب</div>`;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden';
                return;
            }

            let correct = 0, wrong = 0, points = 0;
            const predictionsWithStatus = predictions.map(p => {
                const status = getPredictionStatus(p);
                if (status.status === 'correct') { correct++; points++; } 
                else if (status.status === 'wrong') { wrong++; }
                return { ...p, status };
            });

            const total = predictions.length;
            const accuracy = total > 0 ? Math.round((correct / total) * 100) : 0;

            document.getElementById('playerPoints').textContent = points;
            document.getElementById('playerCorrect').textContent = correct;
            document.getElementById('playerWrong').textContent = wrong;
            document.getElementById('playerTotal').textContent = total;
            document.getElementById('playerAccuracy').textContent = accuracy + '%';

            // Calculate rank
            const allScores = {};
            const allPredictions = state.predictions || [];
            for (let p of allPredictions) {
                if (!allScores[p.user_name]) {
                    allScores[p.user_name] = { points: 0 };
                }
                const parts = (p.match_id || "").split("_");
                if (parts.length < 3) continue;
                const result = findMatchResult(parts[1], parts[2]);
                if (!result) continue;
                const winner = determineWinner(result);
                let isCorrect = false;
                let predictionTeam = p.prediction;
                if (predictionTeam !== 'DRAW') {
                    predictionTeam = translateToArabic(predictionTeam);
                }
                if (winner === null) {
                    isCorrect = predictionTeam === 'DRAW';
                } else {
                    isCorrect = predictionTeam === winner;
                }
                if (isCorrect) allScores[p.user_name].points++;
            }
            const sorted = Object.entries(allScores).sort((a, b) => b[1].points - a[1].points);
            const rank = sorted.findIndex(([name]) => name === userName) + 1;
            document.getElementById('playerRank').textContent = rank > 0 ? `#${rank}` : '-';

            let html = '';
            predictionsWithStatus.forEach((p, idx) => {
                const parts = p.match_id ? p.match_id.split('_') : [];
                const team1Raw = parts.length > 1 ? parts[1] : '?';
                const team2Raw = parts.length > 2 ? parts[2] : '?';
                
                const team1Ar = translateToArabic(team1Raw);
                const team2Ar = translateToArabic(team2Raw);

                let predText = '';
                let predictionTeam = p.prediction;
                if (predictionTeam === 'DRAW') {
                    predText = '🤝 تعادل';
                } else {
                    const predTeamAr = translateToArabic(predictionTeam);
                    if (predTeamAr === team1Ar) {
                        predText = `🏆 فوز ${getFlag(team1Ar)} ${team1Ar}`;
                    } else if (predTeamAr === team2Ar) {
                        predText = `🏆 فوز ${getFlag(team2Ar)} ${team2Ar}`;
                    } else {
                        predText = `🔮 ${predictionTeam}`;
                    }
                }

                const status = p.status;
                let statusClass = 'pending';
                let statusText = '⏳ قيد الانتظار';
                if (status.status === 'correct') { statusClass = 'correct'; statusText = '✅ صحيح'; } 
                else if (status.status === 'wrong') { statusClass = 'wrong'; statusText = '❌ خاطئ'; }

                const timeStr = p.created_at ? formatDate(p.created_at) : 'تاريخ غير معروف';

                html += `
                <div class="player-prediction-item">
                    <div class="num">#${idx + 1}</div>
                    <div class="match-info">
                        <div class="teams">
                            <span class="flag">${getFlag(team1Ar)}</span> ${team1Ar} 🆚 <span class="flag">${getFlag(team2Ar)}</span> ${team2Ar}
                        </div>
                        <div class="pred">🔮 ${predText}</div>
                        <span class="status ${statusClass}">${statusText}</span>
                    </div>
                    <div class="time">🕒 ${timeStr}</div>
                </div>
                `;
            });

            listContainer.innerHTML = html;
            modal.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ============================================================
        //  CLOSE MODAL
        // ============================================================
        function closePlayerModal() {
            document.getElementById('playerPredictionsModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        document.getElementById('playerModalCloseBtn').addEventListener('click', closePlayerModal);
        document.getElementById('playerPredictionsModal').addEventListener('click', function(e) {
            if (e.target === this) closePlayerModal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') closePlayerModal();
        });

        // ============================================================
        //  TOAST
        // ============================================================
        function showToast(msg) {
            const t = document.getElementById('copyToast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }

        // ============================================================
        //  THEME
        // ============================================================
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const newTheme = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme === 'light' ? 'light' : '');
            localStorage.setItem('theme', newTheme);
            document.getElementById('themeToggle').textContent = newTheme === 'light' ? '☀️ الوضع الفاتح' : '🌙 الوضع المظلم';
        }

        if (localStorage.getItem('theme') === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeToggle').textContent = '☀️ الوضع الفاتح';
        }

        // ============================================================
        //  CLEAR CACHE AND RELOAD
        // ============================================================
        function clearCacheAndReload() {
            clearCache();
            showToast('🗑️ تم مسح الكاش، جاري التحديث...');
            setTimeout(() => {
                location.reload();
            }, 500);
        }

        // ============================================================
        //  AUTO UPDATE
        // ============================================================
        function startAutoUpdate() {
            setInterval(() => {
                renderLeaderboard(currentLeaderboardPeriod);
            }, 30000);
        }

        // ============================================================
        //  INIT
        // ============================================================
        async function init() {
            console.log("🚀 بدء تحميل لوحة المتصدرين");
            
            await loadPreviousGames();
            await getAllPredictions();
            
            state.loaded = true;
            renderLeaderboard('all');
            startAutoUpdate();
            console.log("✅ تم التحميل بنجاح");
        }

        // ============================================================
        //  EXPOSE GLOBALLY
        // ============================================================
        window.openPlayerPredictions = openPlayerPredictions;
        window.setLeaderboardPeriod = setLeaderboardPeriod;
        window.toggleTheme = toggleTheme;
        window.showToast = showToast;
        window.renderLeaderboard = renderLeaderboard;
        window.clearCacheAndReload = clearCacheAndReload;
        window.clearCache = clearCache;

        // ============================================================
        //  START
        // ============================================================
        init();
    </script>

</body>
</html>
